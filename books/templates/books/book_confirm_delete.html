{% extends 'books/base.html' %}

{% block title %}Kitobni o'chirish — KitobX{% endblock %}

{% block content %}
<section class="delete-layout" data-reveal>
    <div class="delete-card">
        <span class="delete-icon"><svg><use href="#icon-alert"></use></svg></span>
        <span class="eyebrow">Tasdiqlash</span>
        <h1>Kitobni o'chirish kerakmi?</h1>
        <p><strong>{{ book.title }}</strong> bazadan o'chiriladi. Bu amalni ortga qaytarib bo'lmaydi.</p>
        <form method="post" class="page-actions centered">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger"><svg><use href="#icon-trash"></use></svg><span>Ha, o'chirish</span></button>
            <a href="{% url 'book_detail' book.id %}" class="btn btn-ghost"><svg><use href="#icon-back"></use></svg><span>Bekor qilish</span></a>
        </form>
    </div>
</section>
{% endblock %}
